<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>заметка</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --text: #1a1a1a;
      --muted: #999;
      --border: #ddd;
      --accent: #1a1a1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    .wrap {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Setup screen */
    #setup {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .setup-title {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .setup-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .setup-desc a {
      color: var(--text);
    }

    .setup-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setup-field label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .setup-field input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      color: var(--text);
      outline: none;
      width: 100%;
    }

    .setup-field input:focus {
      border-bottom-color: var(--text);
    }

    .btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 12px 24px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      align-self: flex-start;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.75; }
    .btn:disabled { opacity: 0.35; cursor: default; }

    /* Note screen */
    #note { display: none; flex-direction: column; gap: 0; }

    #title-input {
      background: transparent;
      border: none;
      font-size: 28px;
      font-family: 'Georgia', serif;
      color: var(--text);
      outline: none;
      width: 100%;
      padding: 0 0 16px;
      border-bottom: 1px solid var(--border);
    }

    #title-input::placeholder { color: var(--border); }

    #body-input {
      background: transparent;
      border: none;
      font-size: 16px;
      font-family: 'Georgia', serif;
      color: var(--text);
      outline: none;
      width: 100%;
      min-height: 60vh;
      resize: none;
      line-height: 1.8;
      padding: 20px 0 0;
    }

    #body-input::placeholder { color: var(--border); }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    #status {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .save-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 20px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .save-btn:hover { border-color: var(--text); }
    .save-btn:disabled { opacity: 0.35; cursor: default; }

    /* Secret reset — tiny dot bottom-right */
    #secret-reset {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    #secret-reset:hover { background: #c00; }
  </style>
</head>
<body>

<div class="wrap">

  <!-- SETUP SCREEN -->
  <div id="setup">
    <div class="setup-title">настройка</div>
    <p class="setup-desc">
      Заметка хранится в GitHub Gist — доступна с любого устройства.<br><br>
      1. Создай <a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank">GitHub токен</a> с правом <code>gist</code>.<br>
      2. Создай пустой <a href="https://gist.github.com" target="_blank">секретный Gist</a> (файл можно назвать <code>note.json</code>).<br>
      3. Вставь токен и ID Gist'а ниже.
    </p>

    <div class="setup-field">
      <label>GitHub Token</label>
      <input id="cfg-token" type="password" placeholder="ghp_xxxxxxxxxx" autocomplete="off" />
    </div>

    <div class="setup-field">
      <label>Gist ID</label>
      <input id="cfg-gist" type="text" placeholder="abc123def456..." autocomplete="off" />
    </div>

    <button class="btn" id="setup-btn">сохранить и открыть</button>
  </div>

  <!-- NOTE SCREEN -->
  <div id="note">
    <input id="title-input" type="text" placeholder="заголовок" />
    <textarea id="body-input" placeholder="текст заметки..."></textarea>
    <div class="status-bar">
      <span id="status">—</span>
      <button class="save-btn" id="save-btn">сохранить</button>
    </div>
  </div>

</div>

<!-- Secret reset button -->
<button id="secret-reset" title="сбросить настройки"></button>

<script>
  const $ = id => document.getElementById(id);

  const STORE_TOKEN = 'note_token';
  const STORE_GIST  = 'note_gist';
  const FILE_NAME   = 'note.json';

  let token = '', gistId = '';
  let saveTimer = null;

  // ── Init ──────────────────────────────────────────────────────────────────

  function init() {
    token  = localStorage.getItem(STORE_TOKEN) || '';
    gistId = localStorage.getItem(STORE_GIST)  || '';

    if (token && gistId) {
      showNote();
      loadNote();
    } else {
      showSetup();
    }
  }

  // ── Screens ───────────────────────────────────────────────────────────────

  function showSetup() {
    $('setup').style.display = 'flex';
    $('note').style.display  = 'none';
  }

  function showNote() {
    $('setup').style.display = 'none';
    $('note').style.display  = 'flex';
  }

  // ── Setup ─────────────────────────────────────────────────────────────────

  $('setup-btn').addEventListener('click', async () => {
    const t = $('cfg-token').value.trim();
    const g = $('cfg-gist').value.trim();
    if (!t || !g) { alert('заполни оба поля'); return; }

    localStorage.setItem(STORE_TOKEN, t);
    localStorage.setItem(STORE_GIST, g);
    token  = t;
    gistId = g;

    showNote();
    await loadNote();
  });

  // ── API ───────────────────────────────────────────────────────────────────

  async function gistGet() {
    const r = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
    });
    if (!r.ok) throw new Error(`get: ${r.status}`);
    return r.json();
  }

  async function gistPatch(content) {
    const body = { files: { [FILE_NAME]: { content } } };
    const r = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(`patch: ${r.status}`);
    return r.json();
  }

  // ── Load ──────────────────────────────────────────────────────────────────

  async function loadNote() {
    setStatus('загрузка...');
    try {
      const data = await gistGet();
      const fileObj = data.files[FILE_NAME];
      if (fileObj && fileObj.content) {
        try {
          const parsed = JSON.parse(fileObj.content);
          $('title-input').value = parsed.title || '';
          $('body-input').value  = parsed.body  || '';
        } catch {
          // fallback: plain text
          $('body-input').value = fileObj.content;
        }
      }
      setStatus('загружено · ' + now());
    } catch (e) {
      setStatus('ошибка загрузки: ' + e.message);
    }
  }

  // ── Save ──────────────────────────────────────────────────────────────────

  async function saveNote() {
    $('save-btn').disabled = true;
    setStatus('сохранение...');
    try {
      const payload = JSON.stringify({
        title: $('title-input').value,
        body:  $('body-input').value
      }, null, 2);
      await gistPatch(payload);
      setStatus('сохранено · ' + now());
    } catch (e) {
      setStatus('ошибка сохранения: ' + e.message);
    } finally {
      $('save-btn').disabled = false;
    }
  }

  $('save-btn').addEventListener('click', saveNote);

  // Ctrl+S / Cmd+S
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveNote();
    }
  });

  // Auto-save after 3 s of inactivity
  function scheduleAutoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNote, 3000);
  }

  $('title-input').addEventListener('input', scheduleAutoSave);
  $('body-input').addEventListener('input', scheduleAutoSave);

  // ── Secret reset ──────────────────────────────────────────────────────────

  $('secret-reset').addEventListener('click', () => {
    if (!confirm('Сбросить настройки? Токен и Gist ID будут удалены с этого устройства.')) return;
    localStorage.removeItem(STORE_TOKEN);
    localStorage.removeItem(STORE_GIST);
    $('title-input').value = '';
    $('body-input').value  = '';
    $('cfg-token').value   = '';
    $('cfg-gist').value    = '';
    showSetup();
  });

  // ── Helpers ───────────────────────────────────────────────────────────────

  function setStatus(msg) { $('status').textContent = msg; }

  function now() {
    return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  }

  // ── Start ─────────────────────────────────────────────────────────────────

  init();
</script>
</body>
</html>
